plugins {
    id 'java'
    id 'jacoco'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.8.1'
}

test {
    useJUnitPlatform()
    finalizedBy jacocoTestReport
}

jacoco {
    toolVersion = '0.8.12'
}

jacocoTestReport {
    dependsOn test
    reports {
        xml.required = true
        html.required = true
    }

    afterEvaluate {
        classDirectories.setFrom(
                files(classDirectories.files.collect { dir ->
                    fileTree(dir: dir).exclude([
                            '**/CustomList$CustomListIterator.class'
                    ])
                })
        )
    }
}

// ================== COVERAGE VERIFICATION ==================
jacocoTestCoverageVerification {
    dependsOn test

    violationRules {
        rule {
            enabled = true

            // Fail the build if coverage is below 90%
            limit {
                counter = 'INSTRUCTION'
                value = 'COVEREDRATIO'
                minimum = 0.80
            }

            // Optional: Also check branch coverage
            limit {
                counter = 'BRANCH'
                value = 'COVEREDRATIO'
                minimum = 0.80   // You can make this stricter later
            }
        }

        rule {
            element = 'CLASS'
            excludes = [
                    'CustomList$CustomListIterator'
            ]
            limit {
                counter = 'LINE'
                minimum = 0.0
            }
        }
    }
}

// Ensure verification runs with check/build
check {
    dependsOn jacocoTestCoverageVerification
}

// Optional: Also run verification when doing `build`
build {
    dependsOn jacocoTestCoverageVerification
}